<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart POS - Điểm bán hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Hệ thống Smart POS (Tích hợp AI)</span>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Danh sách hàng hóa</h5>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Mã SP</th>
                                    <th>Tên sản phẩm</th>
                                    <th>Tồn kho</th>
                                    <th>Giá bán</th>
                                    <th>Hành động</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for item in products %}
                                <tr>
                                    <td class="align-middle">{{ item.id }}</td>
                                    <td class="align-middle"><strong>{{ item.name }}</strong></td>
                                    <td class="align-middle">
                                        <span class="badge bg-info text-dark">{{ item.stock }}</span>
                                    </td>
                                    <td class="align-middle text-danger fw-bold">{{ "{:,.0f}".format(item.price) }} đ</td>
                                    <td class="align-middle">
                                        <button class="btn btn-sm btn-success">Thêm vào Đơn</button>
                                    </td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-warning">
                        <h5 class="mb-0 text-dark fw-bold">Hóa đơn hiện tại</h5>
                    </div>
                    <div class="card-body">
                        <div class="text-center text-muted py-4">
                            <em>Chưa có sản phẩm nào trong giỏ...</em>
                        </div>
                        
                        <hr>
                        
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="mb-0">Tổng tiền:</h5>
                            <h4 class="text-danger mb-0 fw-bold">0 đ</h4>
                        </div>
                        
                        <button class="btn btn-primary w-100 py-2 fw-bold fs-5">Thanh toán ngay</button>
                    </div>
                </div>
            </div>
            
        </div>
    </div>
</body>
</html>
