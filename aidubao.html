<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Smart POS - AI Dự báo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: Arial, sans-serif; }
        .topbar-main { background-color: #0052cc; color: white; padding: 0 15px; }
        .topbar-main a.nav-btn { color: #e6e6e6; text-decoration: none; padding: 12px 15px; display: inline-block; font-size: 14px; }
        .topbar-main a.nav-btn:hover, .topbar-main a.active { color: white; background-color: #0043a8; font-weight: bold; }
        .dropdown-menu { border-radius: 4px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-top: 0; }
        .dropdown-menu a.dropdown-item:hover { background-color: #f0f8ff; color: #0052cc; font-weight: bold; }
        .ai-card { border-left: 4px solid #ffc107; }
    </style>
</head>
<body>
    <div class="topbar-main d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <a href="/dashboard" class="fs-5 fw-bold text-white me-3 text-decoration-none"><i class="bi bi-shop"></i> Smart POS</a>
            <a href="/tongquan" class="nav-btn">Tổng quan</a>
            <a href="/dashboard" class="nav-btn"><i class="bi bi-cart"></i> Bán hàng</a>
            <div class="dropdown d-inline-block">
                <a href="#" class="nav-btn dropdown-toggle" data-bs-toggle="dropdown"><i class="bi bi-box-seam"></i> Hàng hóa</a>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="/hanghoa"><i class="bi bi-list-ul"></i> Danh mục</a></li>
                    <li><a class="dropdown-item" href="#"><i class="bi bi-tags"></i> Thiết lập giá</a></li>
                </ul>
            </div>
            <a href="/giaodich" class="nav-btn">Giao dịch</a>
            <a href="/aidubao" class="nav-btn text-warning fw-bold active"><i class="bi bi-graph-up-arrow"></i> AI Dự báo</a>
        </div>
        <div><span class="me-3 small">Chi nhánh trung tâm</span><a href="/" class="btn btn-sm btn-light text-primary fw-bold">Đăng xuất</a></div>
    </div>

    <div class="container-fluid mt-4">
        <h4 class="mb-4"><i class="bi bi-robot text-primary"></i> Phân tích & Dự báo Tồn kho (AI)</h4>
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm border-0 ai-card mb-3">
                    <div class="card-body">
                        <h6 class="text-danger fw-bold"><i class="bi bi-exclamation-triangle-fill"></i> CẢNH BÁO HẾT HÀNG</h6>
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item d-flex justify-content-between align-items-center border-0 px-0"><strong>Bút bi Thiên Long</strong><span class="badge bg-danger rounded-pill">Cần nhập 150</span></li>
                        </ul>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white fw-bold">Biểu đồ dự báo nhu cầu (4 Tuần tới)</div>
                    <div class="card-body"><canvas id="aiChart" height="120"></canvas></div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        new Chart(document.getElementById('aiChart').getContext('2d'), {
            type: 'line',
            data: { labels: ['Tuần 1', 'Tuần 2', 'Tuần 3', 'Tuần 4'], datasets: [{ label: 'Thực tế', data: [120, 150, 180, 130], borderColor: 'gray', borderDash: [5, 5] }, { label: 'AI Dự báo', data: [130, 165, 210, 160], borderColor: 'blue', backgroundColor: 'rgba(0,0,255,0.1)', fill: true }] }
        });
    </script>
</body>
</html>
